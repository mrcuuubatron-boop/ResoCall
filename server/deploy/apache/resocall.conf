# Apache vhost for ResoCall (reverse proxy to backend and frontend)
# Enable modules before use:
# sudo a2enmod proxy proxy_http headers rewrite ssl
# sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName resocall.local

    ProxyPreserveHost On
    ProxyRequests Off

    # Keep real client/proto information for FastAPI behind proxy
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # Backend API (FastAPI)
    ProxyPass /api http://127.0.0.1:8000/api retry=0 timeout=600 keepalive=On
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Optional docs route
    ProxyPass /docs http://127.0.0.1:8000/docs retry=0 timeout=600 keepalive=On
    ProxyPassReverse /docs http://127.0.0.1:8000/docs
    ProxyPass /openapi.json http://127.0.0.1:8000/openapi.json retry=0 timeout=600 keepalive=On
    ProxyPassReverse /openapi.json http://127.0.0.1:8000/openapi.json

    # Frontend (Next.js)
    ProxyPass / http://127.0.0.1:3000/ retry=0 timeout=120 keepalive=On
    ProxyPassReverse / http://127.0.0.1:3000/

    # Large file uploads for call audio
    LimitRequestBody 0

    ErrorLog ${APACHE_LOG_DIR}/resocall-error.log
    CustomLog ${APACHE_LOG_DIR}/resocall-access.log combined
</VirtualHost>

# If HTTPS is enabled, duplicate block for :443 and set:
# RequestHeader set X-Forwarded-Proto "https"
